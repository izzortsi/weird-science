name: Knowledge Base — Manual Claude Code Notification

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Knowledge Base Generation"]
    types: [completed]

permissions:
  contents: write
  issues: write

jobs:
  run-copilot-agent:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Attempt to find generated knowledge-database branch (if any)
        shell: bash
        run: |
          set -euo pipefail
          echo "Searching for branches named knowledge-database/generated-*..."
          git fetch --all --prune
          # Look for remote branches first, then local
          BRANCH=$(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/remotes/origin/knowledge-database/generated-* 2>/dev/null | sed 's|^origin/||' | head -n1 || true)
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/heads/knowledge-database/generated-* 2>/dev/null | head -n1 || true)
          fi
          if [ -n "$BRANCH" ]; then
            echo "Found generated branch: $BRANCH. Checking it out."
            git checkout "$BRANCH" || git checkout -b "$BRANCH" "origin/$BRANCH" || true
          else
            echo "No generated branch found; continuing with current checkout."
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Ensure analysis artifacts exist
        id: check_files
        run: |
          set -e
          if [ ! -f knowledge-database/analysis-data.json ] || [ ! -f knowledge-database/claude-prompt.md ]; then
            echo "One or more required knowledge-database files are missing. Printing diagnostics..." >&2
            echo "Listing knowledge-database contents:" >&2
            ls -la knowledge-database || true
            echo "Last commits touching knowledge-database:" >&2
            git --no-pager log --pretty=oneline -n 10 -- knowledge-database || true
            echo "analysis-data.json or claude-prompt.md not found. Run the knowledge-base-generation workflow first." >&2
            exit 1
          fi

      - name: Create GitHub issue with manual instructions
        id: create_issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Get the branch name
          BRANCH=$(git branch --show-current)

          # Create issue with instructions
          gh issue create \
            --title "🤖 Claude Code: Knowledge Base Analysis Ready (Run ${{ github.run_id }})" \
            --label "claude-code,automation,knowledge-base" \
            --body "$(cat <<'EOF'
          ## 🎯 Action Required: Run Claude Code Locally

          The knowledge base generation has completed successfully. Please run Claude Code locally to perform semantic analysis.

          ### 📋 Steps to Complete

          1. **Pull the generated branch:**
             \`\`\`bash
             git fetch origin
             git checkout $BRANCH
             \`\`\`

          2. **Open Claude Code in your editor** (VS Code with Claude Code extension)

          3. **Review the generated files:**
             - 📄 [\`knowledge-database/claude-prompt.md\`](../blob/$BRANCH/knowledge-database/claude-prompt.md) - Full prompt for semantic analysis
             - 📊 [\`knowledge-database/analysis-data.json\`](../blob/$BRANCH/knowledge-database/analysis-data.json) - Structured data about LaTeX sources and citations

          4. **Run Claude Code with the prompt:**
             - Copy the contents of \`knowledge-database/claude-prompt.md\`
             - Paste into Claude Code chat
             - Let Claude analyze the repository and generate the knowledge base

          5. **Review and commit the results:**
             - Claude will create files in \`knowledge-database/concepts/\`
             - Review the generated Markdown files
             - Commit the changes:
               \`\`\`bash
               git add knowledge-database/concepts
               git commit -m "feat(kb): add Claude-generated knowledge base concepts"
               git push origin $BRANCH
               \`\`\`

          6. **Create a Pull Request:**
             - Open a PR from \`$BRANCH\` to \`dev\`
             - Review and merge when ready

          ### 📊 Analysis Summary

          - **Projects Analyzed:** $(jq -r '.total_projects' knowledge-database/analysis-data.json)
          - **LaTeX Files:** $(jq -r '.total_latex_files' knowledge-database/analysis-data.json)
          - **Citations Found:** $(jq -r '.total_citations' knowledge-database/analysis-data.json)
          - **Zotero Items:** $(jq -r '.total_zotero_items' knowledge-database/analysis-data.json)
          - **Bibliography Entries:** $(jq -r '.total_bib_entries' knowledge-database/analysis-data.json)

          ### 🔗 Quick Links

          - [View Branch: \`$BRANCH\`](../tree/$BRANCH)
          - [Workflow Run #${{ github.run_id }}](../actions/runs/${{ github.run_id }})
          - [Claude Prompt](../blob/$BRANCH/knowledge-database/claude-prompt.md)
          - [Analysis Data](../blob/$BRANCH/knowledge-database/analysis-data.json)

          ---

          💡 **Tip:** You can also use the downloaded artifact from the workflow run if you prefer not to checkout the branch.

          🤖 *This issue was automatically created by the Knowledge Base Generation workflow.*
          EOF
          )"

          echo "Issue created successfully!"

      - name: Upload knowledge-database artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-database-ready-for-claude
          path: knowledge-database/
          retention-days: 30