name: Build and Deploy Quartz Site

on:
  push:
    branches: [dev]
    paths:
      - 'knowledge-database/**'
      - '**/project-summary.md'
      - 'quartz-site/**'
      - '.github/workflows/build-quartz.yml'
  pull_request:
    branches: [dev]
    paths:
      - 'knowledge-database/**'
      - '**/project-summary.md'
      - 'quartz-site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git info
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Initialize Quartz
        run: |
          cd quartz-site
          
          # Check if Quartz is already initialized
          if [ ! -f "package.json" ]; then
            echo "Initializing Quartz v4.5.2..."
            # Clone the Quartz repository at a specific version for reproducibility
            git clone --depth 1 --branch v4.5.2 https://github.com/jackyzha0/quartz.git temp-quartz
            
            # Copy necessary files from Quartz
            cp -r temp-quartz/quartz ./
            cp temp-quartz/package.json ./
            cp temp-quartz/package-lock.json ./
            cp temp-quartz/tsconfig.json ./
            
            # Copy additional config files if they don't exist
            if [ ! -f ".gitignore" ]; then
              cp temp-quartz/.gitignore ./
            fi
            if [ ! -f ".prettierignore" ]; then
              cp temp-quartz/.prettierignore ./
            fi
            
            # Clean up
            rm -rf temp-quartz
            
            echo "Quartz initialized successfully"
          else
            echo "Quartz already initialized"
          fi
          
          # Install dependencies (package-lock.json always exists after initialization)
          npm ci
      
      - name: Setup Quartz content
        run: |
          # Create content directory structure
          mkdir -p quartz-site/content

          # Copy knowledge-database content
          if [ -d "knowledge-database" ]; then
            cp -r knowledge-database/* quartz-site/content/ || true

            # Use knowledge-database README as the homepage index
            if [ -f "knowledge-database/README.md" ]; then
              cp knowledge-database/README.md quartz-site/content/index.md
            fi
          fi

          # Copy project summaries
          find . -name 'project-summary.md' -type f | while read file; do
            # Get project name from path
            project=$(echo "$file" | sed 's|./||' | sed 's|/project-summary.md||' | tr '/' '-')
            mkdir -p quartz-site/content/projects
            cp "$file" "quartz-site/content/projects/${project}-summary.md"
          done
      
      - name: Build Quartz site
        run: |
          cd quartz-site
          
          # Build the Quartz site
          npx quartz build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz-site/public
  
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
