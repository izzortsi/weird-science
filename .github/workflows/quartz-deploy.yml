name: Quartz Deploy (after PR merge)

on:
  push:
    branches: [dev]
    paths:
      - 'knowledge-database/concepts/**'
  workflow_dispatch:

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Quartz build workflow
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-quartz.yml',
              ref: 'dev'
            })