name: Knowledge Base Generation

on:
  push:
    branches: [ 'dev' ]
    paths:
      - '**/*.tex'
      - '**/*.md'
      - '.github/workflows/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-kb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run generation script if available
        shell: bash
        run: |
          set -euo pipefail
          if [ -x .github/scripts/generate_knowledge_db.sh ]; then
            echo "Running .github/scripts/generate_knowledge_db.sh"
            .github/scripts/generate_knowledge_db.sh
          elif [ -f knowledge-database/generate.py ]; then
            echo "Running knowledge-database/generate.py"
            python knowledge-database/generate.py
          else
            echo "No generation script found. Please implement .github/scripts/generate_knowledge_db.sh or knowledge-database/generate.py to create knowledge-database/analysis-data.json and knowledge-database/claude-prompt.md." >&2
            exit 1
          fi

      - name: Verify generated artifacts
        run: |
          set -e
          echo "Listing knowledge-database after generation:"
          ls -la knowledge-database || true
          if [ ! -f knowledge-database/analysis-data.json ] || [ ! -f knowledge-database/claude-prompt.md ]; then
            echo "Required artifacts missing after generation." >&2
            exit 1
          fi

      - name: Commit generated artifacts to a dedicated branch
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          GENERATED_BRANCH="knowledge-database/generated-${{ github.run_id }}"
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git checkout -b "$GENERATED_BRANCH"
          git add knowledge-database || true
          git commit -m "chore(kb): add generated knowledge-database (run ${{ github.run_id }})" || echo "no changes to commit"
          git push --set-upstream origin "$GENERATED_BRANCH"

      - name: Upload artifact for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-database
          path: knowledge-database
          retention-days: 7