# Workflow: run the copilot-agent container as a service on GitHub-hosted runners
# - Uses the service (recommended) so the container lifecycle is tied to the job.
# - If the image is private, see the alternative docker-run method below.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  copilot-agent:
    runs-on: ubuntu-latest
    services:
      copilot-agent:
        image: ghcr.io/github/copilot/agent:latest
        # Expose the container port to the job runner; replace 8080 with the agent's actual port if different.
        ports:
          - 8080:8080
        # Optional Docker run options / healthcheck. Adjust health command/path for the agent.
        options: >-
          --health-cmd "curl -fsS http://localhost:8080/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for copilot-agent to become healthy
        run: |
          # Adjust the URL/path below if the agent uses a different port or health path.
          AGENT_URL="http://localhost:8080"
          for i in $(seq 1 30); do
            if curl -sSf "$AGENT_URL/health" >/dev/null 2>&1; then
              echo "copilot-agent ready at $AGENT_URL"
              exit 0
            fi
            echo "Waiting for copilot-agent... ($i/30)"
            sleep 2
          done
          echo "copilot-agent did not become ready in time"
          exit 1

      - name: 'Example: call the copilot agent'
        env:
          COPILOT_AGENT_URL: http://localhost:8080
        run: |
          # Replace this with the actual calls you need (CLI/HTTP). This is an example health API call.
          echo "Using copilot agent at $COPILOT_AGENT_URL"
          curl -sSf "$COPILOT_AGENT_URL/health"